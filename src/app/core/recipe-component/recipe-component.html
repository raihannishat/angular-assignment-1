<div class="card-container">
  <mat-card class="example-card" appearance="outlined">

    <div class="clickable-card" [routerLink]="['/recipe']" [queryParams]="{ id: recipe.id }">
      <img
        mat-card-image
        class="recipe-image"
        [src]="recipe.image"
        [alt]="recipe.name">

      <mat-card-content>

        <h2>{{ recipe.name }}</h2>

        <p>
          <strong>Category:</strong>
          {{ recipe.category }}
        </p>

        <p>
          <strong>Preparation Time:</strong>
          {{ recipe.prepTime }} minutes
        </p>

        <p>
          <strong>Servings:</strong>
          {{ recipe.servings }}
        </p>

        <p>
          <strong>Description:</strong>
          {{ recipe.description }}
        </p>

        <div>
          <strong>Ingredients:</strong>

          <ul>
            @for (ingredient of recipe.ingredients; track $index) {
              <li>{{ ingredient }}</li>
            }
          </ul>
        </div>

      </mat-card-content>
    </div>

    <mat-card-actions style="justify-content: center;">
      <button [disabled]="recipe.isFavorite" mat-button="filled" class="custom-button" (click)="onAddToFavourites(recipe)">
        Add to Favourites
      </button>
    </mat-card-actions>
  </mat-card>
</div>
